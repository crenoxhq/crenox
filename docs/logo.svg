<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="100%">
  <!-- Definitions for gradients and filters -->
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    
    <!-- Neon Accent Gradient -->
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>
    
    <!-- Shield/Glow Gradient -->
    <linearGradient id="shield-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#4facfe" stop-opacity="0.2" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background Rect -->
  <rect width="800" height="240" rx="16" fill="url(#bg-grad)" />

  <!-- Technical Grid Background -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <path d="M 50,0 L 50,240 M 100,0 L 100,240 M 150,0 L 150,240 M 200,0 L 200,240 M 250,0 L 250,240 M 300,0 L 300,240 M 350,0 L 350,240 M 400,0 L 400,240 M 450,0 L 450,240 M 500,0 L 500,240 M 550,0 L 550,240 M 600,0 L 600,240 M 650,0 L 650,240 M 700,0 L 700,240 M 750,0 L 750,240" />
    <path d="M 0,40 L 800,40 M 0,80 L 800,80 M 0,120 L 800,120 M 0,160 L 800,160 M 0,200 L 800,200" />
  </g>

  <!-- Hexagonal Radar/Scan Effect -->
  <g transform="translate(140, 120)">
    <!-- Outer radar rings -->
    <circle r="85" fill="none" stroke="#00f2fe" stroke-opacity="0.05" stroke-width="1.5" />
    <circle r="65" fill="none" stroke="#00f2fe" stroke-opacity="0.1" stroke-dasharray="10 5" stroke-width="1" />
    <circle r="45" fill="none" stroke="#00f2fe" stroke-opacity="0.15" stroke-width="1" />
    
    <!-- Scanner line -->
    <line x1="0" y1="0" x2="60" y2="-60" stroke="#00f2fe" stroke-opacity="0.6" stroke-width="2" filter="url(#glow)" />
    
    <!-- Cyber Shield Logo -->
    <path d="M-25,-35 L25,-35 L35,0 C35,22 15,38 0,45 C-15,38 -35,22 -35,0 Z" fill="url(#shield-grad)" stroke="#00f2fe" stroke-width="2.5" filter="url(#glow)" />
    
    <!-- Inner lock/check icon -->
    <path d="M-10,3 L-2,-5 L10,-10" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <!-- Typography Group -->
  <g transform="translate(280, 105)">
    <!-- Title: CRENOX -->
    <text x="0" y="0" font-family="'JetBrains Mono', 'Plus Jakarta Sans', monospace, sans-serif" font-weight="900" font-size="64" fill="url(#accent-grad)" letter-spacing="4" filter="url(#glow)">CRENOX</text>
    
    <!-- Subtitle -->
    <text x="4" y="32" font-family="'Plus Jakarta Sans', sans-serif" font-weight="600" font-size="13" fill="#9ca3af" letter-spacing="3.5">HYPER-FAST GIT SECRETS SCANNER</text>
    
    <!-- Decorative scan indicator -->
    <rect x="4" y="50" width="180" height="2" fill="url(#accent-grad)" opacity="0.8" />
    <rect x="190" y="49" width="4" height="4" fill="#00f2fe" filter="url(#glow)" />
    <text x="204" y="54" font-family="monospace" font-size="10" fill="#4b5563" letter-spacing="1">STATUS: SECURED</text>
  </g>
</svg>
