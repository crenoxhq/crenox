name: 'Crenox Git Secrets Scanner'
description: 'Lightweight Git pre-commit secret scanner, credentials detector, and Gitleaks alternative for CI/CD.'
author: 'Khaled Hani'
branding:
  icon: 'shield'
  color: 'black'

inputs:
  version:
    description: 'Crenox version to install (e.g., latest, v2.0.4).'
    required: false
    default: 'latest'
  args:
    description: 'Arguments to pass to the Crenox CLI (e.g., "." to scan staging/workspace, "--history" for git log scan).'
    required: false
    default: '.'
  sarif:
    description: 'Set to "true" to export scan results to a SARIF report named "crenox-results.sarif".'
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: Set up Go environment
      uses: actions/setup-go@v5
      with:
        go-version: '>=1.22'
        cache: true

    - name: Install Crenox CLI
      shell: bash
      run: |
        echo "Installing Crenox CLI..."
        go install github.com/crenoxhq/crenox/v2/cmd/crenox@${{ inputs.version }}
        echo "Crenox installation completed successfully."

    - name: Run Crenox Scan
      shell: bash
      run: |
        if [ "${{ inputs.sarif }}" = "true" ]; then
          echo "Running Crenox scan with SARIF output..."
          # Run scan and write report to file using -o flag
          crenox scan -f sarif -o crenox-results.sarif ${{ inputs.args }}
          echo "Scan finished. Results saved to crenox-results.sarif"
        else
          echo "Running Crenox scan..."
          crenox scan ${{ inputs.args }}
        fi
